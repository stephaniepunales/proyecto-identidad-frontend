<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IDENTIDAD — Artículo</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="articulo.css">
</head>
<body>

  <!-- TOPBAR -->
  <header class="topbar">
    <p class="topbar-back" type= "button" id="btnback"> ← Volver a la revista</p>
    <h1 class="topbar-title">IDENTIDAD</h1>
    <p class="topbar-date">Junio 2026 — N° 01</p>
  </header>

  <!-- ARTICLE PAGE -->
  <main class="article-wrapper">
    <article class="article">

      <!-- META ROW: categoría, fecha -->
      <div class="article-meta-top">
        <span class="meta-category" id="articulo-categoria">Patrimonio · Historia</span>
        <span class="meta-date" id="articulo-fecha"> "Fecha" </span>
      </div>

      <!-- TÍTULO Y SUBTÍTULO -->
      <div class="article-heading">
        <h1 class="article-title" id="articulo-titulo">Colonia del Sacramento</h1>
        <p class="article-subtitle" id="articulo-subtitulo">300 años de historia viva</p>
      </div>

      <!-- AUTOR -->
      <div class="article-author">
        <div class="author-avatar"> "Foto Autor" </div>
        <div class="author-info">
          <span class="author-name" id="articulo-autor">María Fernández</span>
        </div>
      </div>

      <div class="gold-rule"></div>

      <!-- IMAGEN DESTACADA -->
      <figure class="img-destacada">
        <div class="img-placeholder-main">img destacada</div>
      </figure>

      <!-- CONTENIDO 1 -->
      <div class="article-content" id="contenido1"></div>

      <!-- GALERÍA -->
      <section class="gallery-section">
        <p class="gallery-label"></p>
        <div class="gallery-grid">
          <div class="gallery-thumb"><span>img 1</span></div>
          <div class="gallery-thumb"><span>img 2</span></div>
          <div class="gallery-thumb"><span>img 3</span></div>
          <div class="gallery-thumb"><span>img 4</span></div>
        </div>
      </section> <!-- ← cierre de gallery-section -->

      <!-- CONTENIDO 2 -->
      <div class="article-content" id="contenido2"></div>

    </article>
  </main>

  <!-- FOOTER -->
  <footer class="page-footer">
    <span>IDENTIDAD — Cultura · Historia · Patrimonio · Uruguay</span>
  </footer>

  <script src="articulo.js"></script>
</body>
</html>
