<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IDENTIDAD — Artículo</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="articulo.css">
  <link rel="stylesheet" href="/variables.css">
</head>
<body>

  <!-- TOPBAR -->
  <header class="barra-superior">
    <p class="volver-barra" type= "button" id="btnVolver"> ← Volver a la revista</p>
    <h1 class="titulo-barra">IDENTIDAD</h1>
    <p class="fecha-barra">Junio 2026 — N° 01</p>
  </header>

  <!-- ARTICLE PAGE -->
  <main class="envoltorio-articulo">
    <article class="articulo">

      <!-- META ROW: categoría, fecha -->
      <div class="meta-superior-articulo">
        <span class="categoria-meta" id="articulo-categoria">Patrimonio · Historia</span>
        <span class="fecha-meta" id="articulo-fecha"> "Fecha" </span>
      </div>

      <!-- TÍTULO Y SUBTÍTULO -->
      <div class="encabezado-articulo">
        <h1 class="titulo-articulo" id="articulo-titulo">"Colonia del Sacramento"</h1>
        <p class="subtitulo-articulo" id="articulo-subtitulo">"300 años de historia viva"</p>
      </div>

      <!-- AUTOR -->
      <div class="autor-articulo">
        <div class="avatar-autor"> "Foto Autor" </div>
        <div class="info-autor">
          <span class="nombre-autor" id="articulo-autor">María Fernández</span>
        </div>
      </div>

      <div class="linea-dorada"></div>

      <!-- IMAGEN DESTACADA -->
      <figure class="imagen-destacada">
        <div class="marcador-imagen-principal">img destacada</div>
      </figure>

      <!-- CONTENIDO 1 -->
      <div class="contenido-articulo" id="contenido1"></div>

      <!-- GALERÍA -->
      <section class="seccion-galeria">
        <p class="etiqueta-galeria"></p>
        <div class="grilla-galeria">
          <div class="miniatura-galeria"><span>img 1</span></div>
          <div class="miniatura-galeria"><span>img 2</span></div>
          <div class="miniatura-galeria"><span>img 3</span></div>
          <div class="miniatura-galeria"><span>img 4</span></div>
        </div>
      </section> <!-- ← cierre de gallery-section -->

      <!-- CONTENIDO 2 -->
      <div class="contenido-articulo" id="contenido2"></div>

    </article>
  </main>

  <!-- FOOTER -->
  <footer class="pie-pagina">
    <span>IDENTIDAD — Cultura · Historia · Patrimonio · Uruguay</span>
  </footer>

  <script src="articulo.js"></script>
</body>
</html>
