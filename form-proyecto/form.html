<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IDENTIDAD — Nuevo Artículo</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="form.css">
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
  <link rel="stylesheet" href="/variables.css">
  
<body>

  <div class="envoltorio-pagina">

    <!-- Presentacion del formulario -->
    <header class="barra-superior">
      <span class="volver-barra" type= "button" id="btnVolver"> ← Volver a la revista</span>
      <span class="titulo-barra">IDENTIDAD</span>
      <span class="fecha-barra">Junio 2026 — N° 01</span>
    </header>

    <main class="contenedor-formulario">

      <div class="encabezado-formulario">
        <p class="etiqueta-superior-formulario">NUEVA PUBLICACIÓN</p>
        <h1 class="titulo-formulario">Crea tu Columna</h1>
        <p class="subtitulo-formulario">Completá los campos para subir un nuevo artículo</p>
        <div class="linea-dorada"></div>
      </div>

      <form id="formularioArticulo" class="cuerpo-formulario">

        <!-- Título -->
        <div class="grupo-campo completo">
          <label class="etiqueta-campo" for="titulo">Título</label>
          <input class="entrada-campo" type="text" id="titulo" name="titulo" required placeholder="Ej: Colonia del Sacramento, 300 años de historia viva">
        </div>

        <!-- Subtítulo -->
        <div class="grupo-campo completo">
          <label class="etiqueta-campo" for="subtitulo">Subtítulo</label>
          <input class="entrada-campo" type="text" id="subtitulo" name="subtitulo" required placeholder="Ej: 300 años de historia viva">
        </div>

        <!-- Fecha y Autor -->
        <div class="grupo-campo mitad">
          <label class="etiqueta-campo" for="fecha">Fecha de Publicación</label>
          <input class="entrada-campo" type="date" id="fecha" name="fecha">
        </div>
        <div class="grupo-campo mitad">
          <label class="etiqueta-campo" for="autor">Autor</label>
          <input class="entrada-campo" type="text" id="autor" name="autor" placeholder="Nombre del autor">
        </div>

        <!-- Imagen destacada -->
        <div class="grupo-campo completo">
          <label class="etiqueta-campo" for="inputPortada">Imagen Destacada</label>
          <div class="fila-imagen">
            <input class="entrada-campo" type="url" id="inputPortada" placeholder="Pegá la URL de tu Imagen Destacada">
            <div class="vista-previa-imagen" id="previewPortada">
              <span class="marcador-vista-previa">Imagen Destacada</span>
              <img id="imgPortada" src="" alt="Preview portada" hidden>
            </div>
          </div>
        </div>

        <!-- Contenido 1 -->
        <div class="grupo-campo completo">
          <label class="etiqueta-campo">Contenido 1</label>
          <div id="editorContenido1"></div>
        </div>

        <!-- Galería -->
        <div class="grupo-campo completo">
          <label class="etiqueta-campo">Galería de imágenes</label>
          <div class="fila-galeria">
            <div class="columna-galeria">
              <input class="input-galeria-url" type="url" placeholder="URL Imagen 1">
              <div class="miniatura-galeria vacio"><span>Imagen 1</span></div>
            </div>
            <div class="columna-galeria">
              <input class="input-galeria-url" type="url" placeholder="URL Imagen 2">
              <div class="miniatura-galeria vacio"><span>Imagen 2</span></div>
            </div>
            <div class="columna-galeria">
              <input class="input-galeria-url" type="url" placeholder="URL Imagen 3">
              <div class="miniatura-galeria vacio"><span>Imagen 3</span></div>
            </div>
            <div class="columna-galeria">
              <input class="input-galeria-url" type="url" placeholder="URL Imagen 4">
              <div class="miniatura-galeria vacio"><span>Imagen 4</span></div>
            </div>
          </div>
        </div>

        <!-- Contenido 2 -->
        <div class="grupo-campo completo">
          <label class="etiqueta-campo">Contenido 2</label>
          <div id="editorContenido2"></div>
        </div>

        <!-- Categoría -->
        <div class="grupo-campo tercio">
          <label class="etiqueta-campo" for="categoria">Categoría</label>
          <select class="entrada-campo seleccion-campo" id="categoria" name="categoria">
            <option value="" disabled selected>Seleccionar</option>
            <option>Patrimonio</option>
            <option>Historia</option>
            <option>Cultura</option>
            <option>Arte</option>
            <option>Monumentos</option>
            <option>Arquitectura</option>
          </select>
        </div>

        <!-- Mensaje de feedback -->
        <p id="mensaje"></p>

        <!-- Botones -->
        <div class="grupo-campo completo fila-botones">
          <button class="boton boton-publicar" type="submit">Publicar Artículo</button>
        </div>

      </form>

    </main>

    <footer class="pie-pagina">
      <span>IDENTIDAD — Cultura · Historia · Patrimonio · Uruguay</span>
    </footer>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
  <script>
    const toolbarOpciones = [
      [{ header: [1, 2, 3, false] }],
      ['bold', 'italic', 'underline', 'strike'],
      [{ color: [] }, { background: [] }],
      [{ align: [] }],
      [{ list: 'ordered' }, { list: 'bullet' }],
      ['blockquote'],
      ['clean']
    ];

    const quill1 = new Quill('#editorContenido1', {
      theme: 'snow',
      placeholder: 'Introducción del artículo...',
      modules: { toolbar: toolbarOpciones }
    });

    const quill2 = new Quill('#editorContenido2', {
      theme: 'snow',
      placeholder: 'Continuación del artículo...',
      modules: { toolbar: toolbarOpciones }
    });

    // Formato por defecto para los dos editores
    [quill1, quill2].forEach(q => {
      q.format('align', 'justify');
      q.root.style.fontFamily = 'Arial, sans-serif';
      q.root.style.fontSize = '12px';
      q.root.style.lineHeight = '1.5';
    });
  </script>
  <script src="form.js"></script>
</body>
</html>
